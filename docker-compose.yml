services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: ${IMAGE_NAME:-claude-sandbox}
    container_name: ${SANDBOX_NAME:-claude-sandbox}
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Mounted read-only; entrypoint.sh merges auth into a fresh container config
      - ~/.claude.json:/home/sandbox/.claude.json.host:ro
      - ~/.claude/.credentials.json:/home/sandbox/.claude/.credentials.json:ro
      - ${PROJECT_PATH:-.}:/home/sandbox/project
    mem_limit: 2g
    cpus: 2
    security_opt:
      - no-new-privileges:true
