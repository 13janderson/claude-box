services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: claude-sandbox
    stdin_open: true
    tty: true
    volumes:
      # Mounted read-only; entrypoint.sh merges auth into a fresh container config
      - ~/.claude.json:/home/sandbox/.claude.json.host:ro
      - ~/.claude/.credentials.json:/home/sandbox/.claude/.credentials.json:ro
      - ${PROJECT_PATH:-.}:/home/sandbox/project
    mem_limit: 2g
    cpus: 2
    security_opt:
      - no-new-privileges:true
